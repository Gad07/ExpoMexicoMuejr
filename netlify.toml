[build]
  command = "npm run build"
  publish = ".next"

# ─── Security & performance headers for all pages ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking – allow JotForm iframes from form.jotform.com
    X-Frame-Options           = "SAMEORIGIN"

    # Stop MIME-type sniffing
    X-Content-Type-Options    = "nosniff"

    # Referrer sent only for same-origin requests
    Referrer-Policy           = "strict-origin-when-cross-origin"

    # HSTS – enforce HTTPS for 2 years
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Restrict powerful browser APIs
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # ── Content Security Policy ──────────────────────────────────────────────
    # Allows: self, Supabase, Dropbox CDN, JotForm, Google Fonts,
    #         Unsplash images, YouTube embeds, Google Analytics/Tag Manager
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.jotform.com https://*.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.dropboxusercontent.com https://dl.dropboxusercontent.com https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://form.jotform.com https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com; worker-src 'self' blob:; media-src 'self' blob: https://*.dropboxusercontent.com; object-src 'none';"

# ─── Long-term caching for Next.js static assets ─────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache fonts for 1 year ──────────────────────────────────────────────────
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache images in /public for 30 days ─────────────────────────────────────
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# ─── No-cache for API routes (always fresh) ──────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex"

# ─── No-cache for admin routes ───────────────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex, nofollow"
